<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Game - Game Panji</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="game-panel">
      <div class="game-header">
        <h1>Game Catur</h1>
        <p>Putih bergerak dahulu. Klik bidak untuk memilih, lalu klik kotak tujuan.</p>
      </div>
      <div class="board-container">
        <div id="board" class="board"></div>
      </div>
      <div class="controls">
        <div class="status" id="status">Giliran: Putih</div>
        <button id="resetBtn">Mulai Ulang</button>
      </div>
    </section>
    <aside class="info-panel">
      <div class="box">
        <h2>Sejarah Langkah</h2>
        <ol id="moveHistory" class="move-history"></ol>
      </div>
      <div class="box">
        <h2>Bidak Tertangkap</h2>
        <div class="captures">
          <div>
            <h3>Putih</h3>
            <div id="whiteCaptures" class="capture-list"></div>
          </div>
          <div>
            <h3>Hitam</h3>
            <div id="blackCaptures" class="capture-list"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>
  <script src="script.js"></script>
</body>
</html>
